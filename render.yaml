services:
  - type: web
    name: hive-x402-index
    env: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: "production"
      - key: MONROE_TREASURY
        value: "0x15184bf50b3d3f52b60434f8942b7d52f2eb436e"
